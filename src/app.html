<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- Primary Meta Tags -->
	<title>Aalim Khan | Portfolio</title>
	<meta name="title" content="Aalim Khan | Portfolio" />
	<meta name="description" content="Front End Developer portfolio showcasing web and desktop projects." />

	<!-- Open Graph / Facebook / LinkedIn -->
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://aalimkhan-portfolio.vercel.app/" />
	<meta property="og:title" content="Aalim Khan | Portfolio" />
	<meta property="og:description" content="Front End Developer portfolio showcasing web and desktop projects." />
	<meta property="og:image" content="https://aalimkhan-portfolio.vercel.app/avatar.png" />

	<!-- Twitter -->
	<meta property="twitter:card" content="summary_large_image" />
	<meta property="twitter:url" content="https://aalimkhan-portfolio.vercel.app/" />
	<meta property="twitter:title" content="Aalim Khan | Portfolio" />
	<meta property="twitter:description"
		content="Full Stack Developer portfolio showcasing web and desktop projects." />
	<meta property="twitter:image" content="https://aalimkhan-portfolio.vercel.app/avatar.png" />

	<meta name="author" content="Aalim Khan" />
	<meta name="robots" content="index, follow" />

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
